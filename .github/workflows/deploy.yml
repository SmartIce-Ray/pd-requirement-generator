name: Deploy to Cloudflare Pages

# push 到 main 自动部署到生产；也支持在 Actions 页手动触发。
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      # 缓存破坏：把 index.html 里资源的 ?v=__BUILD__ 占位换成本次提交 SHA。
      # CF Pages 给静态资源固定 max-age=14400 且 _headers 改不动它，靠版本化 URL 保证
      # 每次部署浏览器都拉到新 JS/CSS（HTML 是 max-age=0 每次最新），杜绝新HTML+旧JS错配。
      - name: Cache-bust assets with commit SHA
        run: sed -i "s/__BUILD__/${GITHUB_SHA}/g" app/index.html
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 锁 wrangler 4.x：action 默认装的 3.90 不支持 wrangler.jsonc（3.91+ 才支持），
          # 会读不到下面的 pages_build_output_dir 而报“必须指定资源目录”。
          wranglerVersion: '4.84.0'
          # wrangler.jsonc 里 pages_build_output_dir=app，只上线前端；--branch=main = 生产
          command: pages deploy --branch=main
